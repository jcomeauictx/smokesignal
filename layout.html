<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Layout experimentation from MDN and Substack</title>
<style>
html, body {
  box-sizing: border-box;
  margin: .5vmin;
  padding: 0;
  height: 100%;
}
.qrcode {
  height: 98vmin;
  width: 98vmin;
}
.upper {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  height: 100%;
}
.lower {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
}
.upper, .lower > div {
  border-radius: 5px;
  padding: 10px;
  background-color: rgb(207 232 220);
  border: 2px solid rgb(79 185 227);
}
</style>
</head>
<body>
<div class="container">
  <div class="upper">
    <div>upper left</div>
    <div class="qrcode">upper middle</div>
    <div>upper right</div>
  </div>
  <div class="lower">
    <div>lower left</div>
    <div>lower middle</div>
    <div>lower right</div>
  </div>
</div>
</body>
</html>
