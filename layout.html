<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Layout experimentation from MDN and Substack</title>
<style>
.upper {
  display: grid;
  gride-template-columns: 1fr 100vmin 1fr;
  height: 100%;
}
.upper > div {
  border-radius: 5px;
  padding: 10px;
  background-color: rgb(207 232 220);
  border: 2px solid rgb(79 185 227);
}
</style>
</head>
<body>
<div class="container">
  <div class="upper">
    <div>upper left</div>
    <div>upper middle</div>
    <div>upper right</div>
  </div>
  <div class="lower">
    <div>Lower</div>
  </div>
</div>
</body>
</html>
