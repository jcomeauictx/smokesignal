<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Layout experimentation from MDN and Substack</title>
<style>
.container {
  display: grid;
}
.container > div {
  border-radius: 5px;
  padding: 10px;
  background-color: rgb(207 232 220);
  border: 2px solid rgb(79 185 227);
}
</style>
</head>
<body>
<div class="container">
  <div class="upper">
    <div>Upper</div>
  </div>
  <div class="lower">
    <div>Lower</div>
  </div>
</div>
</body>
</html>
