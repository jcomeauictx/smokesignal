<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Layout experimentation from MDN and Substack</title>
<style>
html, body {
  box-sizing: border-box;
  margin: .5vmin;
  padding: 0;
  height: 100%;
}
.qrcode {
  width: 100%;
  aspect-ratio: 1;
}
.middle {
}
.left, .right {
}
.upper {
  display: grid;
  grid-template-columns: 1fr 98vmin 1fr;
  height: 100%;
}
.lower {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
}
.upper, .lower > div {
  border-radius: 5px;
  padding: 10px;
  background-color: rgb(207 232 220);
  border: 2px solid rgb(79 185 227);
}
</style>
<script>
window.addEventListener('orientationchange', function() {
  document.body.style.display = 'none';
  document.body.offsetHeight; // force Safari to recalculate vmin
  document.body.style.display = '';
});
</script>
</head>
<body>
<div class="container">
  <div class="upper">
    <div class="left">upper left</div>
    <div class="qrcode">upper middle</div>
    <div class="right">upper right</div>
  </div>
  <div class="lower">
    <div class="left">lower left</div>
    <div class="middle">lower middle</div>
    <div class="right">lower right</div>
  </div>
</div>
</body>
</html>
