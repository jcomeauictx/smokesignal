<!DOCTYPE html>
<html lang="en">
<head>
<title>Smokesignal</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="smokesignal.css">
<script src="html5-qrcode.min.js"></script>
<script src="qrcode.js"></script>
<script src="smokesignal.js"></script>
</head>
<body>
<h3>Smokesignal</h3>
<div id="status">Status: idle</div>

<h4>Send File</h4>
<input type="file" id="file-input">
<button onclick="uploadFile()">Send</button>

<h4>QR Display (to peer)</h4>
<div id="qrcode" style="width:200px; height:200px;"></div>

<h4>Scanner (from peer)</h4>
<div id="qr-reader"></div>
<div id="scan-results">(Scan results will appear here)</div>

</body>
</html>
