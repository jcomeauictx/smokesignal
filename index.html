<!DOCTYPE html>
<html lang="en">
<head>
<title>Smokesignal</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="smokesignal.css">
<script src="html5-qrcode.min.js"></script>
<script src="qrcode.js"></script>
<script src="smokesignal.js"></script>
</head>
<body>
<div class="qr-container">
  <div class="qr-left"></div>
  <div id="qrcode"></div>
  <div class="qr-right"></div>
</div>
<div id="scan-results">(Scan results will appear here)</div>
<div id="status">Status: idle</div>
<input type="file" id="file-input">
<button onclick="uploadFile()">Send</button>
<div id="qr-reader"></div>
</body>
</html>
