<!DOCTYPE html>
<html lang="en">
<head>
<title>Smokesignal</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="smokesignal.css">
<script src="html5-qrcode.min.js"></script>
<script src="qrcode.js"></script>
<script src="smokesignal.js"></script>
</head>
<body>
<div id="phone-upper" class="qr-container">
  <div class="qr-left hide-on-mobile">
    <input type="file" id="file-input">
    <button id="file-upload">Send</button>
  </div>
  <div id="qrcode"></div>
  <div class="qr-right hide-on-mobile">
    <div id="scan-results">(Scan results will appear here)</div>
    <div id="qr-reader"></div>
  </div>
</div>
<div id="phone-lower" class="vertical-layout show-on-mobile">
  <div class="panel">
  <div class="panel">
  <div class="panel">
</div>
</body>
</html>
